name: AArch64 Edge Build

on:
  push:
    branches: [ "main" ]

jobs:
  build-arm64:
    name: Build ZK Verifier for Raspberry Pi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AArch64 C/C++ Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install RISC Zero Toolchain
        run: |
          curl -L https://risczero.com/install | bash
          ~/.risc0/bin/rzup install

      - name: Cross-compile host program
        working-directory: ./zk-prototypes/phash-zk-verifier
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: cargo build --release --target aarch64-unknown-linux-gnu
